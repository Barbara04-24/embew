  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      overflow:hidden;
      background:black;
      color:white;
    }

    .hero{
      position:relative;
      width:100%;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    /* VIDEO */
    .hero video{
      position:absolute;
      top:50%;
      left:50%;
      min-width:100%;
      min-height:100%;
      transform:translate(-50%, -50%);
      object-fit:cover;
      filter:brightness(0.5);
    }

    /* OVERLAY */
    .overlay{
      position:absolute;
      width:100%;
      height:100%;
      background:linear-gradient(
        to top,
        rgba(0,0,0,0.7),
        rgba(0,0,0,0.2)
      );
    }

    /* CONTENT */
    .content{
      position:relative;
      z-index:2;
      text-align:center;
      animation:fade 2s ease;
      padding:20px;
    }

    .content h1{
      font-size:4rem;
      font-weight:700;
      background:linear-gradient(90deg,#fff,#c084fc);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      margin-bottom:10px;
    }

    .content p{
      font-size:1.2rem;
      color:rgba(255,255,255,0.8);
      margin-bottom:30px;
    }

    /* BUTTON */
    .btn{
      padding:14px 35px;
      border-radius:50px;
      text-decoration:none;
      color:white;
      background:rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.2);
      backdrop-filter:blur(10px);
      transition:0.3s;
      font-weight:600;
    }

    .btn:hover{
      background:#c084fc;
      transform:scale(1.05);
      box-shadow:0 0 20px rgba(192,132,252,0.7);
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:768px){
      .content h1{
        font-size:2.5rem;
      }

      .content p{
        font-size:1rem;
      }
    }

  </style>
</head>
