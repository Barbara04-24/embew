    <style>
        /* --- RESET & BASE STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0f0f0f; /* Warna gelap ala YouTube */
            color: #f1f1f1;
            padding: 20px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 20px auto;
            padding: 10px 0;
            border-bottom: 1px solid #2f2f2f;
        }

        header h1 {
            font-size: 24px;
            color: #ff0000; /* Aksen warna merah cerah */
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* --- LAYOUT UTAMA --- */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2fr 1fr; /* Membagi video utama dan sidebar */
            gap: 24px;
        }

        /* --- BAGIAN VIDEO UTAMA --- */
        .video-player-container {
            display: flex;
            flex-direction: column;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Rasio 16:9 agar responsif */
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-info {
            margin-top: 16px;
        }

        .video-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .video-metadata {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 12px;
        }

        .video-description {
            font-size: 14px;
            line-height: 1.6;
            color: #dedede;
            background: #212121;
            padding: 12px;
            border-radius: 8px;
        }

        /* --- BAGIAN SIDEBAR (REKOMENDASI) --- */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .video-card {
            display: flex;
            gap: 12px;
            cursor: pointer;
            border-radius: 8px;
            padding: 4px;
            transition: background 0.2s ease;
        }

        .video-card:hover {
            background-color: #272727;
        }

        .thumbnail-box {
            width: 120px;
            height: 68px;
            background-color: #333;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }

        .thumbnail-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-title {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.3;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* Batasi teks maksimal 2 baris */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-author {
            font-size: 12px;
            color: #aaa;
        }

        /* --- RESPONSIVE UNTUK HP --- */
        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr; /* Menjadi 1 kolom saja di layar kecil */
                gap: 20px;
            }
            
            body {
                padding: 10px;
            }

            .video-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- JavaScript Interaktif Sederhana -->
    <script>
        function changeVideo(videoUrl, title) {
            const videoElement = document.getElementById('mainVideo');
            const titleElement = document.querySelector('.video-title');
            
            // Ganti source video dan judul
            videoElement.src = videoUrl;
            titleElement.innerText = title;
            
            // Putar video baru secara otomatis
            videoElement.play();
        }
    </script>
